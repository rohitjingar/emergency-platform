version: "3.9"

services:

  # ── Database ──────────────────────────────────────
  postgres:
    image: postgis/postgis:17-3.5
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── ChromaDB ───────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.23
    volumes:
      - chroma_data:/chroma/chroma
    ports:
      - "8001:8000"
    environment:
      - ANONYMIZED_TELEMETRY=False
      - IS_PERSISTENT=TRUE
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v2/heartbeat || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── FastAPI ────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── RQ Worker: Triage ──────────────────────────────
  worker-incidents:
    build:
      context: .
      dockerfile: Dockerfile
    command: rq worker incidents-queue
    env_file:
      - .env.docker
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fastapi:
        condition: service_started
    restart: unless-stopped

  # ── RQ Worker: Assignment ──────────────────────────
  worker-assignment:
    build:
      context: .
      dockerfile: Dockerfile
    command: rq worker assignment-queue
    env_file:
      - .env.docker
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      fastapi:
        condition: service_started
    restart: unless-stopped

  # ── RQ Worker: Scheduler ──────────────────────────
  worker-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: rq worker scheduler-queue
    env_file:
      - .env.docker
    volumes:
      - .:/app
    depends_on:
      redis:
        condition: service_healthy
      fastapi:
        condition: service_started
    restart: unless-stopped

  # ── rqscheduler ────────────────────────────────────
  rqscheduler:
    build:
      context: .
      dockerfile: Dockerfile
    command: rqscheduler --host redis --port 6379
    env_file:
      - .env.docker
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Scheduler Init (runs once) ────────────────────
  scheduler-init:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.workers.scheduler
    env_file:
      - .env.docker
    depends_on:
      redis:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  chroma_data: